name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dialup-site .

      - name: Smoke test container
        run: |
          docker run -d --name dialup-site-ci -p 4001:4001 -e PORT=4001 dialup-site
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4001/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs dialup-site-ci
          exit 1

      - name: Stop smoke test container
        if: always()
        run: docker rm -f dialup-site-ci 2>/dev/null || true
